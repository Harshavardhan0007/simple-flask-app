apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: flask-deployment 
spec:
  replicas: 2
  selector: 
    matchLabels: 
      app: flask-app 
  template: 
    metadata: 
      labels: 
        app: flask-app 
    spec: 
      containers: 
      - name: flask-container 
        image: harshapillari03/simple-flask-app:a9e8ba18fe82eafe6257dd8a88c8fa98a301c6df 
        ports: 
        - containerPort: 5000